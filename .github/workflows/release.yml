name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      release_notes:
        description: "Optional release notes"
        required: false
        type: string

permissions:
  contents: write

env:
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  UV_PYTHON_PREFERENCE: managed

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      name: ${{ steps.meta.outputs.name }}
      notes: ${{ steps.meta.outputs.notes }}
      has_manual_notes: ${{ steps.meta.outputs.has_manual_notes }}

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${INPUT_VERSION#v}"
            tag="v${version}"
            name="${INPUT_RELEASE_NAME}"
            notes="${INPUT_RELEASE_NOTES}"
          else
            version="${GITHUB_REF_NAME#v}"
            tag="${GITHUB_REF_NAME}"
            name=""
            notes=""
          fi

          if [[ -z "$version" ]]; then
            echo "Unable to resolve release version." >&2
            exit 1
          fi

          if [[ -z "$name" ]]; then
            name="Xpdite ${tag}"
          fi

          notes_delimiter="XPDITE_RELEASE_NOTES_$(date +%s)"
          has_manual_notes="false"
          if [[ -n "$notes" ]]; then
            has_manual_notes="true"
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "name=$name"
            echo "has_manual_notes=$has_manual_notes"
            echo "notes<<$notes_delimiter"
            printf '%s\n' "$notes"
            echo "$notes_delimiter"
          } >> "$GITHUB_OUTPUT"

  verify:
    needs: resolve-release
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install managed Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --group dev --python 3.13 --managed-python

      - name: Run lint
        run: bun run lint

      - name: Run frontend tests
        run: bun run test:frontend

      - name: Run backend tests
        run: uv run python -m pytest tests -q

      - name: Transpile Electron process
        run: bun run transpile:electron

      - name: Compile channel bridge
        run: bun run build:channel-bridge

  build-windows:
    needs:
      - resolve-release
      - verify
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install managed Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --group dev --python 3.13 --managed-python

      - name: Build Windows release
        env:
          XPDITE_BUILD_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: bun run dist:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: xpdite-release-win
          path: dist/*.exe
          if-no-files-found: error
          compression-level: 0

  build-macos:
    needs:
      - resolve-release
      - verify
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install macOS audio dependency
        run: brew install portaudio

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install managed Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --group dev --python 3.13 --managed-python

      - name: Build macOS release
        env:
          XPDITE_BUILD_VERSION: ${{ needs.resolve-release.outputs.version }}
          XPDITE_MAC_IDENTITY: "-"
        run: bun run dist:mac

      - name: Upload macOS disk image
        uses: actions/upload-artifact@v7
        with:
          name: xpdite-release-mac
          path: dist/*.dmg
          if-no-files-found: error
          compression-level: 0

  publish:
    needs:
      - resolve-release
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v5
        with:
          name: xpdite-release-win
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v5
        with:
          name: xpdite-release-mac
          path: release-assets/macos

      - name: Create release checksums
        shell: bash
        run: |
          : > release-assets/SHA256SUMS.txt

          for file in release-assets/windows/*.exe release-assets/macos/*.dmg; do
            checksum="$(sha256sum "$file" | awk '{ print $1 }')"
            printf '%s  %s\n' "$checksum" "${file##*/}" >> release-assets/SHA256SUMS.txt
          done

      - name: Publish release with manual notes
        if: ${{ needs.resolve-release.outputs.has_manual_notes == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.resolve-release.outputs.name }}
          make_latest: true
          prerelease: false
          body: ${{ needs.resolve-release.outputs.notes }}
          files: |
            release-assets/windows/*.exe
            release-assets/macos/*.dmg
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true

      - name: Publish release with generated notes
        if: ${{ needs.resolve-release.outputs.has_manual_notes != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.resolve-release.outputs.name }}
          make_latest: true
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/windows/*.exe
            release-assets/macos/*.dmg
            release-assets/SHA256SUMS.txt
          fail_on_unmatched_files: true
