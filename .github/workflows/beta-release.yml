name: Beta Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Beta version without the leading v"
        required: true
        type: string
      release_name:
        description: "Optional prerelease title"
        required: false
        type: string
      release_notes:
        description: "Optional prerelease notes"
        required: false
        type: string

permissions:
  contents: write

env:
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Run frontend tests
        run: bun run test:frontend

      - name: Run backend tests
        run: uv run python -m pytest tests -q

      - name: Transpile Electron process
        run: bun run transpile:electron

      - name: Compile channel bridge
        run: bun run build:channel-bridge

  build-windows:
    needs: verify
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Build Windows prerelease
        run: bun run dist:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: xpdite-beta-win
          path: dist/*.exe
          if-no-files-found: error

  build-macos:
    needs: verify
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install macOS audio dependency
        run: brew install portaudio

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Build macOS prerelease
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bun run dist:mac

      - name: Upload macOS disk image
        uses: actions/upload-artifact@v4
        with:
          name: xpdite-beta-mac
          path: dist/*.dmg
          if-no-files-found: error

  publish:
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: xpdite-beta-win
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: xpdite-beta-mac
          path: release-assets/macos

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="v${{ inputs.version }}"
            name="${{ inputs.release_name }}"
            notes="${{ inputs.release_notes }}"
          else
            tag="${GITHUB_REF_NAME}"
            name=""
            notes=""
          fi

          if [[ -z "$name" ]]; then
            name="Xpdite Beta ${tag}"
          fi

          {
            echo "tag=$tag"
            echo "name=$name"
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish prerelease with manual notes
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_notes != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: true
          body: ${{ steps.meta.outputs.notes }}
          files: |
            release-assets/windows/*.exe
            release-assets/macos/*.dmg
          fail_on_unmatched_files: true

      - name: Publish prerelease with generated notes
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.release_notes == '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: true
          generate_release_notes: true
          files: |
            release-assets/windows/*.exe
            release-assets/macos/*.dmg
          fail_on_unmatched_files: true
