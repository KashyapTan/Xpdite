name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      UV_PYTHON_PREFERENCE: managed

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Install managed Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync --group dev --python 3.13

      - name: Run lint
        run: bun run lint

      - name: Run frontend tests
        run: bun run test:frontend

      - name: Run backend tests
        run: uv run python -m pytest tests -q

      - name: Transpile Electron process
        run: bun run transpile:electron

      - name: Compile channel bridge
        run: bun run build:channel-bridge
