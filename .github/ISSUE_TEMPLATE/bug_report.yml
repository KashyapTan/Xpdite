name: Bug report
description: Create a report to help us improve Xpdite
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: How to reproduce?
      description: Steps to consistently reproduce the issue.
      placeholder: |
        1. Open Xpdite
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Xpdite Version
      description: Which version of Xpdite are you using? (e.g., 1.0.0, dev branch)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which OS are you running Xpdite on?
      options:
        - Windows
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output from the terminal or dev tools here.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I have searched the existing issues to ensure this is not a duplicate.
          required: true
        - label: I have checked the [CLAUDE.md](CLAUDE.md)/docs for potential solutions.
          required: true
